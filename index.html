<body>

        <div class="card">

                <h2 id="txt-dia-actual" class="text-2xl font-black uppercase">Día</h2>

            </div>
        </div>
        <div class="card bg-gray-900 border-none">
            <input type="text" id="in-zona" placeholder="Zona" class="mb-4" oninput="cambiarZona(this.value)">

                <input type="text" id="in-cliente" placeholder="Cliente..." class="flex-1">
                <button onclick="nuevoCliente()" class="bg-blue-600 px-6 rounded-xl font-bold">+</button>
            </div>
        </div>
        <div id="lista-clientes-dia"></div>
    </div>

    <div id="v-cam" class="fixed inset-0 z-[1000] bg-black hidden flex-col">
        <video id="vid" class="flex-1 w-full object-cover" autoplay playsinline muted></video>
        <div class="p-8 bg-black flex flex-col items-center gap-4">

    <nav class="nav-bar">

            <span>RUTAS</span>
        </div>
        <div onclick="irPestaña('curso')" id="n-curso" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            <span>EN CURSO</span>
        </div>
        <div onclick="irPestaña('ajustes')" id="n-ajustes" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span>AJUSTES</span>
        </div>
    </nav>

    <script>
        const KEY = 'GEST_DARK_DATA';
        let datos = { dias: [] };
        let diaIdx = 0;
        let cIdScan = null;
        let stream = null;

        window.onload = function() {
            const save = localStorage.getItem(KEY);
            if(save) {
                datos = JSON.parse(save);
            } else {
                ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'].forEach(n => {
                    datos.dias.push({ nombre: n, zona: '', clientes: [] });
                });
                guardar();
            }
            renderD();
        };

        function guardar() { localStorage.setItem(KEY, JSON.stringify(datos)); }

        function irPestaña(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-detalle-dia').style.display = 'none';

            if(tab === 'rutas') {
                document.getElementById('v-rutas').classList.add('view-active');
                document.getElementById('n-rutas').classList.add('active');
                renderD();
            } else if(tab === 'curso') {
                document.getElementById('v-curso').classList.add('view-active');
                document.getElementById('n-curso').classList.add('active');
                renderCurso();
            } else if(tab === 'ajustes') {
                document.getElementById('v-ajustes').classList.add('view-active');
                document.getElementById('n-ajustes').classList.add('active');
            }
        }

        function abrirDia(idx) {
            diaIdx = idx;
            document.getElementById('txt-dia-actual').innerText = datos.dias[idx].nombre;
            document.getElementById('txt-zona-actual').innerText = datos.dias[idx].zona || 'Sin Zona';
            document.getElementById('in-zona').value = datos.dias[idx].zona;
            document.getElementById('v-detalle-dia').style.display = 'block';
            renderC();
        }

        function cerrarDetalle() { document.getElementById('v-detalle-dia').style.display = 'none'; renderD(); }

        function cambiarZona(v) {
            datos.dias[diaIdx].zona = v;
            document.getElementById('txt-zona-actual').innerText = v || 'Sin Zona';
            guardar();
        }

        function nuevoCliente() {
            const nom = document.getElementById('in-cliente').value;
            if(!nom.trim()) return;
            datos.dias[diaIdx].clientes.push({
                id: Date.now(),
                nombre: nom,
                pedido: '',
                estado: 'p',
                cargado: false
            });
            document.getElementById('in-cliente').value = '';
            guardar(); renderC();
        }

        function setStatus(id, s) {
            const c = datos.dias[diaIdx].clientes.find(c => c.id === id);
            if(c) { c.estado = s; guardar(); renderC(); }
        }

        function setTexto(id, v) {
            const c = datos.dias[diaIdx].clientes.find(c => c.id === id);
            if(c) { c.pedido = v; guardar(); }
        }

        // --- EN CURSO AUTOMATIZADO ---
        function toggleCarga(cId) {
            datos.dias.forEach(d => {
                const c = d.clientes.find(x => x.id === cId);
                if(c) {
                    c.cargado = !c.cargado;
                    // REGLA: Si está cargado, pasar a LISTO automáticamente
                    if(c.cargado) c.estado = 'c';
                }
            });
            guardar(); renderCurso();
        }

        function enviarWA(cId, dIdx) {
            const d = datos.dias[dIdx];
            const c = d.clientes.find(x => x.id === cId);
            if(!c || !c.pedido) return;
            
            // REGLA: Al enviar WhatsApp, pasar a ENVIADO automáticamente
            c.estado = 'e';
            guardar();
            if(document.getElementById('v-detalle-dia').style.display === 'block') renderC();
            
            window.open(`https://wa.me/?text=${encodeURIComponent("*CLIENTE:* " + c.nombre + "\n\n" + c.pedido)}`);
        }

        function marcarServido(cId) {
            if(!confirm("¿Confirmar servido?")) return;
            datos.dias.forEach(d => {
                d.clientes = d.clientes.filter(x => x.id !== cId);
            });
            guardar(); renderCurso();
        }

        // --- RENDERS ---
        function renderD() {
            const cont = document.getElementById('lista-dias');
            cont.innerHTML = '';
            datos.dias.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = "card flex justify-between items-center";
                card.onclick = () => abrirDia(i);
                card.innerHTML = `<div><div class="font-black text-xl uppercase">${d.nombre}</div><div class="text-blue-500 text-[10px] font-bold uppercase tracking-widest">${d.zona || 'Configurar zona'}</div></div><div class="bg-white text-black w-10 h-10 flex items-center justify-center rounded-full font-black">${d.clientes.length}</div>`;
                cont.appendChild(card);
            });
        }

        function renderC() {
            const cont = document.getElementById('lista-clientes-dia');
            cont.innerHTML = '';
            datos.dias[diaIdx].clientes.forEach(c => {
                const border = c.estado === 'p' ? 'border-p' : (c.estado === 'e' ? 'border-e' : 'border-c');
                const card = document.createElement('div');
                card.className = `card ${border}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4"><span class="font-black text-white uppercase text-lg">${c.nombre}</span><button onclick="borrarC(${c.id})" class="text-red-900 font-bold text-[9px] uppercase">Eliminar</button></div>
                    <div class="flex gap-2 mb-4">
                        <button onclick="setStatus(${c.id}, 'p')" class="flex-1 py-3 rounded-lg text-[9px] font-bold ${c.estado==='p'?'bg-orange-500 text-white':'bg-gray-800 text-gray-500'}">PENDIENTE</button>
                        <button onclick="setStatus(${c.id}, 'e')" class="flex-1 py-3 rounded-lg text-[9px] font-bold ${c.estado==='e'?'bg-blue-600 text-white':'bg-gray-800 text-gray-500'}">ENVIADO</button>
                        <button onclick="setStatus(${c.id}, 'c')" class="flex-1 py-3 rounded-lg text-[9px] font-bold ${c.estado==='c'?'bg-green-600 text-white':'bg-gray-800 text-gray-500'}">LISTO</button>
                    </div>
                    <button onclick="abrirScan(${c.id})" class="btn-accion bg-white text-black w-full mb-3">Escanear Nota</button>
                    <textarea oninput="setTexto(${c.id}, this.value)" placeholder="Pedido...">${c.pedido}</textarea>
                    <button onclick="enviarWA(${c.id}, ${diaIdx})" class="btn-accion bg-green-700 text-white w-full">WhatsApp</button>
                `;
                cont.appendChild(card);
            });
        }

        function renderCurso() {
            const cont = document.getElementById('lista-pedidos-curso');
            cont.innerHTML = '';
            let hay = false;
            datos.dias.forEach((d, i) => {
                d.clientes.forEach(c => {
                    if(c.pedido.trim() !== "") {
                        hay = true;
                        const card = document.createElement('div');
                        card.className = "card border-l-4 border-blue-600";
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <div><div class="font-black text-white uppercase text-lg">${c.nombre}</div><div class="text-blue-500 text-[9px] font-bold uppercase">${d.nombre} • ${d.zona}</div></div>
                                <div class="text-[8px] bg-gray-800 px-2 py-1 rounded font-bold">${c.estado === 'p' ? 'PEND' : (c.estado === 'e' ? 'ENV' : 'LISTO')}</div>
                            </div>
                            <div class="bg-black/50 p-3 rounded-xl text-xs text-gray-400 italic mb-4 border border-gray-900">${c.pedido}</div>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="toggleCarga(${c.id})" class="btn-accion ${c.cargado ? 'bg-green-600 text-white' : 'bg-gray-800 text-gray-400'}">${c.cargado ? '✓ CARGADO' : 'CARGAR'}</button>
                                <button onclick="marcarServido(${c.id})" class="btn-accion bg-red-600 text-white">SERVIDO</button>
                            </div>
                        `;
                        cont.appendChild(card);
                    }
                });
            });
            if(!hay) cont.innerHTML = '<div class="py-20 text-center text-gray-600 font-bold text-xs uppercase">No hay pedidos</div>';
        }

        function borrarC(id) { if(confirm("¿Eliminar?")) { datos.dias[diaIdx].clientes = datos.dias[diaIdx].clientes.filter(c => c.id !== id); guardar(); renderC(); } }
        async function abrirScan(id) { cIdScan = id; document.getElementById('v-cam').classList.replace('hidden', 'flex'); try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); document.getElementById('vid').srcObject = stream; } catch (e) { cerrarCamara(); } }
        function cerrarCamara() { if(stream) stream.getTracks().forEach(t => t.stop()); document.getElementById('v-cam').classList.replace('flex', 'hidden'); }
        async function hacerFoto() { const vid = document.getElementById('vid'); const canvas = document.createElement('canvas'); canvas.width = vid.videoWidth; canvas.height = vid.videoHeight; canvas.getContext('2d').drawImage(vid, 0, 0); document.getElementById('cam-status').classList.remove('hidden'); try { const res = await Tesseract.recognize(canvas.toDataURL(), 'spa'); const c = datos.dias[diaIdx].clientes.find(c => c.id === cIdScan); if(c) { c.pedido += (c.pedido ? '\n' : '') + res.data.text.trim(); guardar(); } cerrarCamara(); renderC(); } catch (e) { cerrarCamara(); } }
        function borrarTodo() { if(confirm("¿Borrar todo?")) { localStorage.removeItem(KEY); location.reload(); } }
        function exportarJSON() { const b = new Blob([JSON.stringify(datos)], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "ruta.json"; a.click(); }
        function importarJSON(e) { const r = new FileReader(); r.onload = (ev) => { datos = JSON.parse(ev.target.result); guardar(); location.reload(); }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
