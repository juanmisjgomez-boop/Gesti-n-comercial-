<!DOCTYPE html>

    <style>
        body { 
            background-color: #000000; 
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        .view { display: none; padding: 20px; width: 100%; box-sizing: border-box; }

        .card { 
            background: #111111;

            border: 1px solid #222222;

        input[type="text"], textarea {

        .border-p { border-left: 6px solid #f59e0b; }

        <div id="lista-pedidos-curso"></div>

    <!-- VISTA REPARTO -->
    <div id="v-reparto" class="view">
        <h1 class="text-3xl font-black italic mb-2">REPARTO</h1>
        <p class="text-gray-500 text-xs mb-6 font-bold uppercase tracking-widest">Orden de Entrega</p>
        <div id="lista-reparto"></div>
    </div>

    <!-- VISTA HISTORIAL -->
    <div id="v-historial" class="view">
        <div class="flex items-center gap-4 mb-4">
            <button onclick="irPestaña('rutas')" class="bg-gray-900 p-3 rounded-xl text-white font-black">←</button>
            <h1 class="text-3xl font-black italic">HISTORIAL</h1>
        </div>
        <p class="text-gray-500 text-xs mb-6 font-bold uppercase tracking-widest">Clientes Entregados</p>
        <div id="lista-historial"></div>
    </div>

    <!-- VISTA ABONOS -->
    <div id="v-abonos" class="view">
        <div class="flex items-center gap-4 mb-4">
            <button onclick="irPestaña('rutas')" class="bg-gray-900 p-3 rounded-xl text-white font-black">←</button>
            <h1 class="text-3xl font-black italic">ABONOS</h1>
        </div>
        <p class="text-gray-500 text-xs mb-6 font-bold uppercase tracking-widest">Gestión de Cobros</p>
        
        <div class="card bg-gray-900 border-none">
            <div class="flex gap-2">
                <input type="text" id="abono-cliente" placeholder="Nombre cliente para abono..." 
                       class="flex-1 bg-black p-3 rounded-xl border border-gray-700 text-white outline-none"
                       onkeydown="if(event.key==='Enter') nuevoAbono()">
                <button onclick="nuevoAbono()" class="bg-yellow-600 px-6 rounded-xl font-bold">+</button>

    <!-- VISTA AJUSTES -->
    <div id="v-ajustes" class="view">
        <h1 class="text-3xl font-black italic mb-2">AJUSTES</h1>
        <div class="card">
            <button onclick="exportarJSON()" class="btn-accion bg-blue-600 text-white w-full mb-3 text-sm">Exportar Copia (.json)</button>
            <input type="file" id="import-file" class="hidden" onchange="importarJSON(event)">
            <button onclick="document.getElementById('import-file').click()" class="btn-accion bg-gray-800 text-gray-300 w-full text-sm">Importar Copia</button>
        </div>
        <div class="card">
            <button onclick="borrarTodo()" class="btn-accion bg-red-900 text-white w-full text-sm">Borrar Todo</button>
        </div>

    <!-- DETALLE DÍA -->
    <div id="v-detalle-dia" class="view fixed inset-0 z-[500] bg-black overflow-y-auto pb-32" style="display: none;">
        <div class="flex items-center gap-4 mb-4">
            <button onclick="cerrarDetalle()" class="bg-gray-900 p-4 rounded-xl text-white font-black">←</button>
            <div>
                <h2 id="txt-dia-actual" class="text-2xl font-black uppercase">Día</h2>
                <span id="txt-zona-actual" class="text-blue-500 text-[10px] font-bold uppercase">Sin Zona</span>
            </div>
        </div>
        
        <div class="card bg-gray-900 border-none">
            <input type="text" id="in-zona" placeholder="Zona/Pueblo..." class="mb-4 p-3 rounded-xl border border-gray-700 bg-black text-white" oninput="cambiarZona(this.value)">
            <div class="flex gap-2">
                <input type="text" id="in-cliente" placeholder="Nombre cliente..." class="flex-1 bg-black p-3 rounded-xl border border-gray-700 text-white outline-none"
                       onkeydown="if(event.key==='Enter') nuevoCliente()">
                <button onclick="nuevoCliente()" class="bg-blue-600 px-6 rounded-xl font-bold">+</button>
            </div>
        </div>
        <div id="lista-clientes-dia"></div>
    </div>

    <!-- MODAL CAMARA OCR -->
    <div id="v-cam" class="fixed inset-0 z-[1000] bg-black hidden flex-col">
        <video id="vid" class="flex-1 w-full object-cover" autoplay playsinline muted></video>
        <div class="p-8 bg-black flex flex-col items-center gap-4">
            <div id="cam-status" class="text-blue-500 text-[10px] font-bold animate-pulse hidden uppercase">Escaneando...</div>
            <div class="flex justify-between w-full items-center">
                <button onclick="cerrarCamara()" class="text-gray-500 font-bold uppercase text-xs">Cerrar</button>
                <button onclick="hacerFoto()" class="w-20 h-20 bg-white rounded-full border-8 border-gray-800"></button>
                <div class="w-10"></div>
            </div>
        </div>
    </div>

    <!-- NAVEGACIÓN -->
    <nav class="nav-bar">
        <div onclick="irPestaña('rutas')" id="n-rutas" class="nav-item active">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 01.553-.894L9 2l6 3 5.447-2.724A1 1 0 0121 3.176v10.764a1 1 0 01-.553.894L15 18l-6 2z"></path></svg>
            <span>RUTAS</span>
        </div>
        <div onclick="irPestaña('curso')" id="n-curso" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            <span>PEDIDO</span>
        </div>
        <div onclick="irPestaña('reparto')" id="n-reparto" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span>REPARTO</span>
        </div>
        <div onclick="irPestaña('ajustes')" id="n-ajustes" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span>AJUSTES</span>
        </div>
    </nav>

    <script>
        const KEY = 'GEST_WA_V4_FINAL';
        let datos = { dias: [], historial: [], abonos: [] };
        let diaIdx = 0;
        let cIdScan = null;
        let stream = null;
        let currentTab = 'rutas';

        window.onload = function() {
            const save = localStorage.getItem(KEY);
            if(save) {
                datos = JSON.parse(save);
                if(!datos.historial) datos.historial = [];
                if(!datos.abonos) datos.abonos = [];
            } else {
                ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'].forEach(n => {
                    datos.dias.push({ nombre: n, zona: '', clientes: [] });
                });
                datos.historial = [];
                datos.abonos = [];
                guardar();
            }
            renderD();
        };

        function guardar() { 
            localStorage.setItem(KEY, JSON.stringify(datos)); 
        }

        function irPestaña(tab) {
            currentTab = tab;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-detalle-dia').style.display = 'none';
            
            const viewId = 'v-' + tab;
            const navId = 'n-' + tab;
            
            if(document.getElementById(viewId)) document.getElementById(viewId).classList.add('view-active');
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');

            if(tab === 'rutas') renderD();
            if(tab === 'curso') renderCurso();
            if(tab === 'reparto') renderReparto();
            if(tab === 'historial') renderHistorial();
            if(tab === 'abonos') renderAbonos();
        }

        function renderD() {
            const cont = document.getElementById('lista-dias');
            cont.innerHTML = '';
            datos.dias.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = "card flex justify-between items-center active:bg-gray-900 transition-colors";
                card.onclick = () => abrirDia(i);
                card.innerHTML = `
                    <div>
                        <div class="font-black text-xl uppercase">${d.nombre}</div>
                        <div class="text-blue-500 text-[10px] font-bold uppercase">${d.zona || 'Configurar zona'}</div>
                    </div>
                    <div class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full font-black text-xs">${d.clientes.length}</div>
                `;
                cont.appendChild(card);
            });
        }

        function abrirDia(idx) {
            diaIdx = idx;
            document.getElementById('txt-dia-actual').innerText = datos.dias[idx].nombre;
            document.getElementById('txt-zona-actual').innerText = datos.dias[idx].zona || 'Sin Zona';
            document.getElementById('in-zona').value = datos.dias[idx].zona;
            document.getElementById('v-detalle-dia').style.display = 'block';
            renderC();
        }

        function cerrarDetalle() { document.getElementById('v-detalle-dia').style.display = 'none'; renderD(); }
        function cambiarZona(v) { datos.dias[diaIdx].zona = v; document.getElementById('txt-zona-actual').innerText = v || 'Sin Zona'; guardar(); }

        function nuevoCliente() {
            const nom = document.getElementById('in-cliente').value;
            if(!nom.trim()) return;
            datos.dias[diaIdx].clientes.push({
                id: Date.now(),
                nombre: nom,
                pedido: '',
                foto: null,
                estado: 'p',
                cargado: false,
                ordenReparto: 0
            });
            document.getElementById('in-cliente').value = '';
            guardar(); renderC();
        }

        function setStatus(id, s) {
            const c = datos.dias[diaIdx].clientes.find(c => Number(c.id) === Number(id));
            if(c) { c.estado = s; guardar(); renderC(); }
        }

        function triggerFoto(id) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (re) => {
                    const c = datos.dias[diaIdx].clientes.find(c => Number(c.id) === Number(id));
                    if(c) { c.foto = re.target.result; guardar(); renderC(); }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function setTexto(id, v) {
            const c = datos.dias[diaIdx].clientes.find(c => Number(c.id) === Number(id));
            if(c) { c.pedido = v; guardar(); }
        }

        async function enviarWhatsApp(id) {
            const c = datos.dias[diaIdx].clientes.find(c => Number(c.id) === Number(id));
            if(!c) return;
            const lineas = c.pedido.split('\n').filter(l => l.trim() !== "");
            const pedidoFormateado = lineas.map(l => `• ${l.trim()}`).join('\n');
            const textoBase = `*CLIENTE:* ${c.nombre}\n\n*PEDIDO:*\n${pedidoFormateado}`;
            c.estado = 'e';
            guardar();
            renderC();
            if (c.foto && navigator.canShare) {
                try {
                    const res = await fetch(c.foto);
                    const blob = await res.blob();
                    const file = new File([blob], `pedido.png`, { type: blob.type });
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], text: textoBase });
                        return;
                    }
                } catch (e) {}
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(textoBase)}`);
        }

        function renderC() {
            const cont = document.getElementById('lista-clientes-dia');
            cont.innerHTML = '';
            datos.dias[diaIdx].clientes.forEach(c => {
                const border = c.estado === 'p' ? 'border-p' : (c.estado === 'e' ? 'border-e' : 'border-c');
                const card = document.createElement('div');
                card.className = `card ${border}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-black text-white uppercase text-lg">${c.nombre}</span>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <button onclick="setStatus(${c.id}, 'p')" class="flex-1 py-3 rounded-lg text-[8px] font-bold ${c.estado==='p'?'bg-orange-500 text-white':'bg-gray-800 text-gray-500'}">PENDIENTE</button>
                        <button onclick="setStatus(${c.id}, 'e')" class="flex-1 py-3 rounded-lg text-[8px] font-bold ${c.estado==='e'?'bg-blue-600 text-white':'bg-gray-800 text-gray-500'}">ENVIADO</button>
                        <button onclick="setStatus(${c.id}, 'c')" class="flex-1 py-3 rounded-lg text-[8px] font-bold ${c.estado==='c'?'bg-green-600 text-white':'bg-gray-800 text-gray-500'}">LISTO</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <button onclick="abrirScan(${c.id})" class="btn-accion bg-gray-800 text-white">OCR ESCANEAR</button>
                        <button onclick="triggerFoto(${c.id})" class="btn-accion bg-blue-900 text-white">SUBIR FOTO</button>
                    </div>
                    ${c.foto ? `<div class="img-container"><img src="${c.foto}" class="img-preview"></div>` : ''}
                    <textarea oninput="setTexto(${c.id}, this.value)" placeholder="Escribe el pedido aquí..." class="mb-3 text-sm min-h-[120px]">${c.pedido}</textarea>
                    <button onclick="enviarWhatsApp(${c.id})" class="btn-accion bg-green-600 text-white w-full py-4 text-sm">ENVIAR WHATSAPP</button>
                `;
                cont.appendChild(card);
            });
        }

        function renderCurso() {
            const cont = document.getElementById('lista-pedidos-curso');
            cont.innerHTML = '';
            let hay = false;
            datos.dias.forEach((d) => {
                d.clientes.forEach(c => {
                    if(c.pedido.trim() !== "" || c.foto) {
                        hay = true;
                        const card = document.createElement('div');
                        card.className = "card border-l-4 border-blue-600";
                        card.innerHTML = `
                            <div class="font-black text-white uppercase text-base mb-1">${c.nombre}</div>
                            <div class="text-blue-500 text-[9px] font-bold uppercase mb-3">${d.nombre} • ${d.zona}</div>
                            <div class="flex gap-3 mb-4 bg-black/40 p-2 rounded-xl border border-white/5">
                                ${c.foto ? `
                                    <div class="w-16 h-16 shrink-0 rounded-lg overflow-hidden border border-gray-800">
                                        <img src="${c.foto}" class="w-full h-full object-cover">
                                    </div>
                                ` : ''}
                                <div class="text-[11px] text-gray-400 italic line-clamp-3 overflow-hidden">
                                    ${c.pedido || 'Sin texto'}
                                </div>
                            </div>
                            <button onclick="toggleCarga(${c.id})" class="btn-accion w-full py-4 ${c.cargado ? 'bg-green-600 text-white' : 'bg-blue-900 text-white'} text-[10px] font-black">
                                ${c.cargado ? '✓ LISTO PARA REPARTO' : 'CARGAR EN FURGONETA'}
                            </button>
                        `;
                        cont.appendChild(card);
                    }
                });
            });
            if(!hay) cont.innerHTML = '<div class="py-20 text-center text-gray-600 font-bold uppercase text-xs italic">No hay nada para cargar</div>';
        }

        function renderReparto() {
            const cont = document.getElementById('lista-reparto');
            cont.innerHTML = '';
            let lista = [];
            datos.dias.forEach(d => {
                d.clientes.forEach(c => {
                    if(c.cargado) lista.push({ cliente: c, dia: d.nombre, zona: d.zona });
                });
            });
            lista.sort((a, b) => a.cliente.ordenReparto - b.cliente.ordenReparto);
            if(lista.length === 0) {
                cont.innerHTML = '<div class="py-20 text-center text-gray-600 font-bold uppercase text-xs italic">Carga pedidos primero</div>';
                return;
            }
            lista.forEach((item) => {
                const c = item.cliente;
                const card = document.createElement('div');
                card.className = "card border-l-4 border-green-600";
                card.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="flex flex-col gap-3">
                            <button onclick="moverReparto(${c.id}, -1)" class="w-14 h-14 flex items-center justify-center bg-gray-800 rounded-2xl text-blue-500 text-2xl font-black shadow-xl active:scale-90 transition-transform">▲</button>
                            <button onclick="moverReparto(${c.id}, 1)" class="w-14 h-14 flex items-center justify-center bg-gray-800 rounded-2xl text-blue-500 text-2xl font-black shadow-xl active:scale-90 transition-transform">▼</button>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <div class="font-black text-white uppercase text-base leading-tight">${c.nombre}</div>
                                    <div class="text-green-500 text-[8px] font-bold uppercase mb-2">${item.zona}</div>
                                </div>
                                <button onclick="marcarServido(${c.id})" class="bg-green-600 text-white px-5 py-3 rounded-xl font-black text-[11px] uppercase shadow-lg shadow-green-900/50 active:scale-95 transition-transform">Entregado</button>
                            </div>
                            <div class="flex gap-3 bg-black/40 p-2 rounded-xl border border-white/5">
                                ${c.foto ? `
                                    <div class="w-16 h-16 shrink-0 rounded-lg overflow-hidden border border-gray-800">
                                        <img src="${c.foto}" class="w-full h-full object-cover">
                                    </div>
                                ` : ''}
                                <div class="text-[11px] text-gray-400 italic line-clamp-3 overflow-hidden">
                                    ${c.pedido || 'Sin texto'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function renderHistorial() {
            const cont = document.getElementById('lista-historial');
            cont.innerHTML = '';
            if(!datos.historial || datos.historial.length === 0) {
                cont.innerHTML = '<div class="py-20 text-center text-gray-600 font-bold uppercase text-xs italic">No hay historial de entregas</div>';
                return;
            }
            [...datos.historial].reverse().forEach((h) => {
                const card = document.createElement('div');
                card.className = "card border-l-4 border-gray-700";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-black text-white uppercase text-base">${h.nombre}</div>
                            <div class="text-blue-500 text-[8px] font-bold uppercase mb-2">${h.zona || 'Sin zona'} | ${h.fechaEntrega}</div>
                        </div>
                        <button onclick="borrarHistorial(${h.idHistorial})" class="bg-red-900/30 text-red-500 px-3 py-2 rounded-lg text-[9px] font-black uppercase">Borrar</button>

        function renderAbonos() {
            const cont = document.getElementById('lista-abonos');
            cont.innerHTML = '';
            if(!datos.abonos || datos.abonos.length === 0) {
                cont.innerHTML = '<div class="py-20 text-center text-gray-600 font-bold uppercase text-xs italic">No hay abonos pendientes</div>';
                return;
            }
            
            [...datos.abonos].reverse().forEach((a) => {
                const card = document.createElement('div');
                card.className = "card border-abono";
                card.innerHTML = `
                    <div class="mb-4">
                        <span class="font-black text-white uppercase text-lg">${a.cliente}</span>
                        <div class="text-yellow-500/50 text-[9px] font-bold uppercase mt-1">Fecha: ${a.fecha}</div>
                    </div>
                    <textarea 
                        id="nota-abono-${a.id}" 
                        oninput="actualizarNotaAbono(${a.id}, this.value)"

                        class="mb-4 text-sm min-h-[80px] bg-black border-yellow-900/30"
                    >${a.valor || ''}</textarea>
                    <button id="btn-abono-${a.id}" onclick="liquidarAbono(${a.id})" 
                            class="btn-accion btn-abonar-init w-full py-4 text-sm font-black uppercase">

        function nuevoAbono() {
            const input = document.getElementById('abono-cliente');
            const nom = input.value;
            if(!nom.trim()) return;

            const ahora = new Date();
            const fechaStr = ahora.toLocaleDateString() + ' ' + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const idNuevo = Date.now();
            datos.abonos.push({
                id: idNuevo,
                cliente: nom,
                valor: '',
                fecha: fechaStr
            });
            
            input.value = '';
            guardar();
            renderAbonos();
        }

        function actualizarNotaAbono(id, v) {
            const idx = datos.abonos.findIndex(a => Number(a.id) === Number(id));
            if(idx !== -1) {
                datos.abonos[idx].valor = v;
                guardar();
            }
        }

        function liquidarAbono(id) {
            const btn = document.getElementById(`btn-abono-${id}`);
            if(!btn) return;
            btn.classList.remove('btn-abonar-init');
            btn.classList.add('btn-abonado-final');
            btn.innerText = 'ABONADO';
            setTimeout(() => {
                datos.abonos = datos.abonos.filter(a => Number(a.id) !== Number(id));
                guardar();
                renderAbonos();
            }, 500);
        }

        function marcarServido(cId) { 
            const targetId = Number(cId);
            let diaEncontradoIdx = -1;
            let clienteEncontradoIdx = -1;

            for(let i = 0; i < datos.dias.length; i++) {
                const cIdx = datos.dias[i].clientes.findIndex(cl => Number(cl.id) === targetId);
                if(cIdx !== -1) {
                    diaEncontradoIdx = i;
                    clienteEncontradoIdx = cIdx;
                    break;
                }
            }

            if(diaEncontradoIdx === -1) return;

            const clienteData = datos.dias[diaEncontradoIdx].clientes[clienteEncontradoIdx];
            const zonaOriginal = datos.dias[diaEncontradoIdx].zona;
            const ahora = new Date();
            const fechaStr = ahora.toLocaleDateString() + ' ' + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const itemHistorial = {
                nombre: clienteData.nombre,
                pedido: clienteData.pedido,
                idHistorial: Date.now(),
                fechaEntrega: fechaStr,
                zona: zonaOriginal
            };
            
            datos.historial.push(itemHistorial);
            datos.dias[diaEncontradoIdx].clientes.splice(clienteEncontradoIdx, 1);
            
            guardar(); 
            
            if(currentTab === 'reparto') renderReparto();
            if(currentTab === 'historial') renderHistorial();
            if(currentTab === 'curso') renderCurso();
            if(currentTab === 'rutas') renderD();
            if(document.getElementById('v-detalle-dia').style.display === 'block') renderC();
        }

        function moverReparto(id, direccion) {
            let lista = [];
            datos.dias.forEach(d => {
                d.clientes.forEach(c => { if(c.cargado) lista.push(c); });
            });
            lista.sort((a, b) => a.ordenReparto - b.ordenReparto);
            const idx = lista.findIndex(c => Number(c.id) === Number(id));
            if(idx === -1) return;
            const nuevoIdx = idx + direccion;
            if(nuevoIdx >= 0 && nuevoIdx < lista.length) {
                const temp = lista[idx].ordenReparto;
                lista[idx].ordenReparto = lista[nuevoIdx].ordenReparto;
                lista[nuevoIdx].ordenReparto = temp;
                guardar();
                renderReparto();
            }
        }

        function toggleCarga(cId) { 
            datos.dias.forEach(d => { 
                const c = d.clientes.find(x => Number(x.id) === Number(cId)); 
                if(c) { 
                    c.cargado = !c.cargado; 
                    if(c.cargado) {
                        c.estado = 'c';
                        let maxOrden = 0;
                        datos.dias.forEach(d2 => d2.clientes.forEach(c2 => {
                            if(c2.ordenReparto > maxOrden) maxOrden = c2.ordenReparto;
                        }));
                        c.ordenReparto = maxOrden + 1;
                    }
                } 
            }); 
            guardar(); 
            renderCurso(); 
        }

        function borrarHistorial(hId) {
            // El botón borrar del historial ahora filtra y elimina el elemento seleccionado
            datos.historial = datos.historial.filter(h => Number(h.idHistorial) !== Number(hId));
            guardar();
            renderHistorial();
        }
