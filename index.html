<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 90px;
            min-height: 100vh;

        .view-active { display: block; }

        .card { 
            background: #111111; 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 16px; 
            border: 1px solid #222222;
        }

        textarea {
            background: #1a1a1a;

            width: 100%;

        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: 75px; background: #0a0a0a; 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid #222222; z-index: 1000; 
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555555; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: #3b82f6; }

        .btn-accion {
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .border-p { border-left: 6px solid #f59e0b; }
        .border-e { border-left: 6px solid #3b82f6; }
        .border-c { border-left: 6px solid #10b981; }

        .img-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;

            border: 1px solid #333;

        .img-preview { width: 100%; height: auto; display: block; }

<body>

    <div id="toast">Copiado al portapapeles</div>

    <!-- VISTA RUTAS -->
    <div id="v-rutas" class="view view-active">
        <h1 class="text-3xl font-black italic mb-2">MIS RUTAS</h1>
        <div id="lista-dias" class="mt-6"></div>
    </div>

    <!-- VISTA EN CURSO -->
    <div id="v-curso" class="view">
        <h1 class="text-3xl font-black italic mb-2">EN CURSO</h1>
        <div id="lista-pedidos-curso" class="mt-6"></div>
    </div>

    <!-- DETALLE CLIENTE (MODAL) -->
    <div id="v-detalle-dia" class="view fixed inset-0 z-[500] bg-black overflow-y-auto pb-32" style="display: none;">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="cerrarDetalle()" class="bg-gray-900 p-4 rounded-xl text-white font-black text-xl">←</button>
            <h2 id="txt-dia-actual" class="text-2xl font-black uppercase">Día</h2>
        </div>
        
        <div class="card bg-gray-900 border-none mb-6">
            <div class="flex gap-2">
                <input type="text" id="in-cliente" placeholder="Nombre del cliente..." class="flex-1 bg-black p-3 rounded-xl border border-gray-700 text-white outline-none">
                <button onclick="nuevoCliente()" class="bg-blue-600 px-6 rounded-xl font-bold">+</button>
            </div>
        </div>

        <div id="lista-clientes-dia"></div>
    </div>

    <nav class="nav-bar">
        <div onclick="irPestaña('rutas')" id="n-rutas" class="nav-item active">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 01.553-.894L9 2l6 3 5.447-2.724A1 1 0 0121 3.176v10.764a1 1 0 01-.553.894L15 18l-6 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span>RUTAS</span>
        </div>
        <div onclick="irPestaña('curso')" id="n-curso" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span>EN CURSO</span>
        </div>
    </nav>

    <script>
        const KEY = 'GEST_WA_FOTOS_V1';
        let datos = { dias: [] };
        let diaIdx = 0;

        window.onload = function() {
            const save = localStorage.getItem(KEY);
            if(save) {
                datos = JSON.parse(save);
            } else {
                ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'].forEach(n => {
                    datos.dias.push({ nombre: n, clientes: [] });
                });
                guardar();
            }
            renderD();
        };

        function guardar() { localStorage.setItem(KEY, JSON.stringify(datos)); }

        function irPestaña(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-detalle-dia').style.display = 'none';
            if(tab === 'rutas') {
                document.getElementById('v-rutas').classList.add('view-active');
                document.getElementById('n-rutas').classList.add('active');
                renderD();
            } else {
                document.getElementById('v-curso').classList.add('view-active');
                document.getElementById('n-curso').classList.add('active');
                renderCurso();
            }
        }

        function renderD() {
            const cont = document.getElementById('lista-dias');
            cont.innerHTML = '';
            datos.dias.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = "card flex justify-between items-center";
                card.onclick = () => abrirDia(i);
                card.innerHTML = `
                    <div class="font-black text-xl uppercase">${d.nombre}</div>
                    <div class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs">${d.clientes.length}</div>
                `;
                cont.appendChild(card);
            });
        }

        function abrirDia(idx) {
            diaIdx = idx;
            document.getElementById('txt-dia-actual').innerText = datos.dias[idx].nombre;
            document.getElementById('v-detalle-dia').style.display = 'block';
            renderC();
        }

        function cerrarDetalle() { document.getElementById('v-detalle-dia').style.display = 'none'; renderD(); }

        function nuevoCliente() {
            const nom = document.getElementById('in-cliente').value;
            if(!nom.trim()) return;
            datos.dias[diaIdx].clientes.push({
                id: Date.now(),
                nombre: nom,
                pedido: '',
                foto: null,
                estado: 'p'
            });
            document.getElementById('in-cliente').value = '';
            guardar(); renderC();
        }

        function triggerFoto(id) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (re) => {
                    const c = datos.dias[diaIdx].clientes.find(c => c.id === id);
                    if(c) { c.foto = re.target.result; guardar(); renderC(); }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function setTexto(id, v) {
            const c = datos.dias[diaIdx].clientes.find(c => c.id === id);
            if(c) { c.pedido = v; guardar(); }
        }

        function showToast(msj) {
            const t = document.getElementById('toast');
            t.innerText = msj;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        async function compartirWhatsApp(id) {
            const c = datos.dias[diaIdx].clientes.find(c => c.id === id);
            if(!c) return;

            c.estado = 'e';
            guardar();
            renderC();

            const textoBase = `*CLIENTE:* ${c.nombre}\n*PEDIDO:* ${c.pedido}`;

            // Si hay foto y el navegador soporta compartir archivos (Móviles modernos)
            if (c.foto && navigator.canShare) {
                try {
                    // Convertir Base64 a archivo real
                    const res = await fetch(c.foto);
                    const blob = await res.blob();
                    const file = new File([blob], `pedido_${c.nombre}.png`, { type: blob.type });

                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            text: textoBase
                        });
                        return;
                    }
                } catch (err) { console.error("Error compartiendo:", err); }
            }

            // Fallback: Copiar texto y abrir WhatsApp
            document.execCommand('copy'); // Intento de copia
            showToast("Texto copiado. Pega en WhatsApp");
            setTimeout(() => {
                window.open(`https://wa.me/?text=${encodeURIComponent(textoBase)}`);
            }, 500);
        }

        function renderC() {
            const cont = document.getElementById('lista-clientes-dia');
            cont.innerHTML = '';
            datos.dias[diaIdx].clientes.forEach(c => {
                const border = c.estado === 'p' ? 'border-p' : (c.estado === 'e' ? 'border-e' : 'border-c');
                const card = document.createElement('div');
                card.className = `card ${border}`;
                
                card.innerHTML = `
                    <div class="font-black text-white uppercase text-lg mb-4">${c.nombre}</div>
                    
                    <button onclick="triggerFoto(${c.id})" class="btn-accion bg-gray-800 text-blue-400 mb-3">
                        ${c.foto ? 'CAMBIAR FOTO' : 'AÑADIR IMAGEN / FOTO'}
                    </button>

                    ${c.foto ? `<div class="img-container"><img src="${c.foto}" class="img-preview"></div>` : ''}

                    <textarea oninput="setTexto(${c.id}, this.value)" placeholder="Escribe el pedido aquí...">${c.pedido}</textarea>
                    
                    <div class="mt-4">
                        <button onclick="compartirWhatsApp(${c.id})" class="btn-accion bg-green-600 text-white">
                            ENVIAR PEDIDO POR WHATSAPP
                        </button>
                    </div>
                `;
                cont.appendChild(card);
            });
        }

        function renderCurso() {
            const cont = document.getElementById('lista-pedidos-curso');
            cont.innerHTML = '';
            let hay = false;
            datos.dias.forEach((d) => {
                d.clientes.forEach(c => {
                    if(c.pedido.trim() !== "" || c.foto) {
                        hay = true;
                        const card = document.createElement('div');
                        card.className = "card";
                        card.innerHTML = `
                            <div class="font-black text-white uppercase mb-2">${c.nombre} (${d.nombre})</div>
                            ${c.foto ? `<img src="${c.foto}" class="w-full rounded-lg mb-2 border border-gray-800">` : ''}
                            <div class="text-gray-400 text-sm mb-4">${c.pedido}</div>
                            <button onclick="marcarServido(${c.id})" class="btn-accion bg-red-900 text-white">LISTO / SERVIDO</button>
                        `;
                        cont.appendChild(card);
                    }
                });
            });
            if(!hay) cont.innerHTML = '<div class="text-center text-gray-600 py-20 font-bold uppercase">No hay pedidos pendientes</div>';
        }

        function marcarServido(cId) {
            datos.dias.forEach(d => { d.clientes = d.clientes.filter(x => x.id !== cId); });
            guardar(); renderCurso();
        }

    </script>
</body>
</html>
